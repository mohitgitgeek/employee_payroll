{% extends "base.html" %}
{% block title %}Modify Account{% endblock %}
{% block content %}
  <h2>Modify Account #{{ account.accNo }}</h2>
  <form method="POST" action="{{ url_for('modify_account', accNo=account.accNo) }}">
    <div class="form-grid">
      <label>Name<input type="text" name="name" value="{{ account.name }}" required></label>
      <label>Designation<input type="text" name="des" value="{{ account.des or '' }}"></label>
      <label>Address<input type="text" name="add" value="{{ account.add or '' }}"></label>
      <label>Basic Salary (BA)<input type="number" name="ba" value="{{ account.ba }}"></label>
      <label>Dearness Allowance (DA)<input type="number" name="da" value="{{ account.da }}"></label>
      <label>Travelling Allowance (TA)<input type="number" name="ta" value="{{ account.ta }}"></label>
      <label>House Rent Allowance (HRA)<input type="number" name="hra" value="{{ account.hra }}"></label>
      <label>Provident Fund (PF)<input type="number" name="pf" value="{{ account.pf }}"></label>
      <label>Employee State Insurance (ESI)<input type="number" name="esi" value="{{ account.esi }}"></label>
    </div>
    <div class="actions">
      <button type="submit" class="btn btn-primary">Save Changes</button>
      <a href="{{ url_for('list_accounts') }}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
{% endblock %}
