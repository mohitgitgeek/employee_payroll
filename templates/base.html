<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Payroll Management System{% endblock %}</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f8f9fa; margin: 0; color: #222; }
    .container { max-width: 1000px; margin: 32px auto; background: #fff; padding: 28px 30px;
                 border-radius: 8px; box-shadow: 0 2px 8px #ccc; }
    h1, h2 { margin-top: 0; }
    nav { margin-bottom: 18px; display: flex; gap: 10px; flex-wrap: wrap; }
    nav a { text-decoration: none; color: #007bff; font-weight: 600; padding: 6px 10px; border-radius: 6px; }
    nav a:hover { background: #eef4ff; }
    table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 0.92rem; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background: #f1f1f1; }
    .btn { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; text-decoration: none;
           display: inline-block; font-size: 0.9rem; }
    .btn-primary { background: #007bff; color: #fff; }
    .btn-warning { background: #ffc107; color: #333; }
    .btn-danger { background: #dc3545; color: #fff; }
    .btn-secondary { background: #6c757d; color: #fff; }
    .alert { padding: 10px 14px; margin-bottom: 15px; border-radius: 4px; }
    .alert-success { background: #d4edda; color: #155724; }
    .alert-danger { background: #f8d7da; color: #721c24; }
    .alert-info { background: #d1ecf1; color: #0c5460; }
    form label { display: block; margin-top: 10px; font-weight: 600; font-size: 0.88rem; }
    form input { width: 100%; padding: 8px; margin-top: 4px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 18px; }
    .actions { margin-top: 18px; display: flex; gap: 8px; }
    .cards { display: flex; gap: 16px; flex-wrap: wrap; }
    .card { flex: 1; min-width: 160px; background: #f1f7ff; border: 1px solid #d6e6ff; border-radius: 8px; padding: 16px; }
    .card .num { font-size: 1.6rem; font-weight: 700; color: #007bff; }
    .anomaly { background: #fff3cd; }
    .muted { color: #666; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="container">
    <nav>
      <a href="{{ url_for('index') }}">🏠 Home</a>
      <a href="{{ url_for('list_accounts') }}">📋 All Accounts</a>
      <a href="{{ url_for('add_account') }}">➕ Add Account</a>
      <a href="{{ url_for('insights') }}">📊 ML Insights</a>
    </nav>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
